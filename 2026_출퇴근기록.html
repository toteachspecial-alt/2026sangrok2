<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출퇴근 기록</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    .record-enter { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-ring {
      animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full overflow-auto" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
   <div class="min-h-full p-6 flex flex-col">
    <!-- 헤더 -->
    <header class="text-center mb-8 pt-4">
     <h1 id="app-title" class="text-2xl font-bold text-white mb-2">출퇴근 기록</h1>
     <div id="current-time" class="text-4xl font-light text-cyan-400 tracking-wider"></div>
     <div id="current-date" class="text-sm text-gray-400 mt-1"></div>
    </header>
    <!-- 메인 콘텐츠 -->
    <div class="flex-1 flex flex-col gap-6 overflow-hidden">
     <div class="flex gap-6 flex-1 overflow-hidden justify-center">
      <!-- 왼쪽: 입력 및 버튼 -->
      <div class="w-80 flex flex-col overflow-hidden flex-shrink-0">
       <!-- 반, 이름 입력 -->
       <div class="mb-6 space-y-3">
        <div class="relative">
         <select id="team-input" class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-cyan-400/50 focus:ring-2 focus:ring-cyan-400/20 transition-all appearance-none cursor-pointer">
          <option value="" class="bg-gray-800 text-white">반을 선택하세요</option>
          <option value="바리스타1반" class="bg-gray-800 text-white">바리스타1반</option>
          <option value="바리스타2반" class="bg-gray-800 text-white">바리스타2반</option>
         </select>
         <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
         </svg>
        </div>
        <div class="relative">
         <input id="name-input" type="text" placeholder="이름을 입력하세요" class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-cyan-400/50 focus:ring-2 focus:ring-cyan-400/20 transition-all">
         <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
         </svg>
        </div>
       </div>
       <!-- 출퇴근 버튼 -->
       <div class="flex gap-4">
        <button id="check-in-btn" onclick="handleCheckIn()" class="flex-1 relative overflow-hidden bg-gradient-to-br from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-semibold py-5 px-6 rounded-2xl shadow-lg shadow-emerald-500/30 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
         <div class="absolute inset-0 bg-white/10 pulse-ring rounded-2xl"></div>
         <span class="relative flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
          </svg>
          <span id="check-in-text">출근</span>
         </span>
        </button>
        <button id="check-out-btn" onclick="handleCheckOut()" class="flex-1 relative overflow-hidden bg-gradient-to-br from-rose-500 to-rose-600 hover:from-rose-400 hover:to-rose-500 text-white font-semibold py-5 px-6 rounded-2xl shadow-lg shadow-rose-500/30 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
         <div class="absolute inset-0 bg-white/10 pulse-ring rounded-2xl" style="animation-delay: 0.5s;"></div>
         <span class="relative flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span id="check-out-text">퇴근</span>
         </span>
        </button>
       </div>
       <!-- 오늘의 기록 요약 -->
       <div id="today-summary" class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border border-white/10 mt-6">
        <h2 class="text-sm font-medium text-gray-400 mb-3 flex items-center gap-2">
         <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
         </svg> 오늘의 기록</h2>
        <div id="today-stats" class="grid grid-cols-2 gap-4">
         <div class="text-center">
          <div class="text-xs text-gray-500 mb-1">첫 출근</div>
          <div id="first-check-in" class="text-lg font-semibold text-emerald-400">--:--</div>
         </div>
         <div class="text-center">
          <div class="text-xs text-gray-500 mb-1">마지막 퇴근</div>
          <div id="last-check-out" class="text-lg font-semibold text-rose-400">--:--</div>
         </div>
        </div>
       </div>
       <!-- 월별 선택 -->
       <div class="flex items-center justify-between bg-white/10 backdrop-blur-sm rounded-2xl p-4 border border-white/10 mt-6">
        <button onclick="previousMonth()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
         <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
         </svg>
        </button>
        <div class="text-center flex-1">
         <div class="text-sm text-gray-400">기록 월</div>
         <div id="current-month" class="text-lg font-semibold text-white"></div>
        </div>
        <button onclick="nextMonth()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
         <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
         </svg>
        </button>
       </div>
       <!-- 월별 현황 버튼 -->
       <div class="flex justify-center mt-6">
        <button onclick="openMonthlySummary()" class="flex items-center gap-2 px-6 py-3 bg-gradient-to-br from-cyan-500 to-cyan-600 hover:from-cyan-400 hover:to-cyan-500 text-white font-semibold rounded-xl shadow-lg shadow-cyan-500/30 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
         </svg>
         <span id="summary-button-text">월별 현황</span>
        </button>
       </div>
      </div>
      <!-- 오른쪽: 기록 목록 -->
      <div class="w-80 flex flex-col overflow-hidden flex-shrink-0">
       <div class="bg-white/5 backdrop-blur-sm rounded-2xl border border-white/10 overflow-hidden flex flex-col h-full">
        <div class="border-b border-white/10">
         <div class="flex items-center justify-between p-4">
          <h2 class="text-sm font-medium text-gray-400 flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
           </svg> 기록 내역</h2>
          <span id="record-count" class="text-xs text-gray-500 bg-white/10 px-2 py-1 rounded-full">0건</span>
         </div>
         <div class="flex gap-2 px-4 pb-3">
          <button onclick="filterByTeam('all')" class="team-tab px-4 py-2 rounded-lg text-sm font-medium transition-all border" data-team="all">전체</button>
          <button onclick="filterByTeam('바리스타1반')" class="team-tab px-4 py-2 rounded-lg text-sm font-medium transition-all border" data-team="바리스타1반">바리스타1반</button>
          <button onclick="filterByTeam('바리스타2반')" class="team-tab px-4 py-2 rounded-lg text-sm font-medium transition-all border" data-team="바리스타2반">바리스타2반</button>
         </div>
        </div>
        <div id="records-list" class="flex-1 overflow-y-auto p-4">
         <div class="text-center text-gray-500 text-sm">아직 기록이 없습니다</div>
        </div>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div id="delete-confirm-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
   <div class="bg-gray-800 rounded-lg border border-white/10 p-6 max-w-sm w-full">
    <h2 class="text-lg font-semibold text-white mb-2">기록 삭제</h2>
    <p class="text-gray-400 text-sm mb-6">이 기록을 삭제하시겠습니까?</p>
    <div class="flex gap-3 justify-end">
     <button onclick="cancelDelete()" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-white font-medium transition-colors">취소</button>
     <button onclick="confirmDelete()" class="px-4 py-2 rounded-lg bg-rose-500 hover:bg-rose-600 text-white font-medium transition-colors">삭제</button>
    </div>
   </div>
  </div>

  <!-- 월별 현황 모달 -->
  <div id="summary-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
   <div class="bg-gray-800 rounded-lg border border-white/10 p-6 max-w-3xl w-full max-h-[80vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-6">
     <h2 id="summary-modal-title" class="text-2xl font-bold text-white">월별 현황</h2>
     <button onclick="closeMonthlySummary()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
      <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
     </button>
    </div>
    <div id="summary-content" class="space-y-6"></div>
   </div>
  </div>

  <!-- 토스트 메시지 -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none text-sm"></div>

  <script>
    // ─── localStorage 기반 데이터 관리 ───────────────────────────────────
    const STORAGE_KEY = 'attendance_records_2026';

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveRecords(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function createRecord(record) {
      const data = loadRecords();
      record.__id = Date.now().toString() + Math.random().toString(36).slice(2);
      data.push(record);
      saveRecords(data);
      return record;
    }

    function deleteRecordById(id) {
      const data = loadRecords().filter(r => r.__id !== id);
      saveRecords(data);
    }
    // ─────────────────────────────────────────────────────────────────────

    let records = [];
    let isLoading = false;
    let currentMonth = getCurrentMonth();
    let selectedTeam = 'all';

    function getCurrentMonth() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function formatMonthDisplay(monthStr) {
      const [year, month] = monthStr.split('-');
      return `${year}년 ${parseInt(month)}월`;
    }

    function previousMonth() {
      const [year, month] = currentMonth.split('-');
      let m = parseInt(month) - 1, y = parseInt(year);
      if (m < 1) { m = 12; y -= 1; }
      currentMonth = `${y}-${String(m).padStart(2, '0')}`;
      updateMonthDisplay();
    }

    function nextMonth() {
      const [year, month] = currentMonth.split('-');
      let m = parseInt(month) + 1, y = parseInt(year);
      if (m > 12) { m = 1; y += 1; }
      currentMonth = `${y}-${String(m).padStart(2, '0')}`;
      updateMonthDisplay();
    }

    function updateMonthDisplay() {
      document.getElementById('current-month').textContent = formatMonthDisplay(currentMonth);
      renderRecords(records);
      updateTodayStats(records);
    }

    function formatDateWithDay(dateStr) {
      // dateStr 예: "2026. 3. 6." 형태로 들어올 수 있으므로 파싱
      const date = new Date(dateStr.replace(/\./g, '/').replace(/\s/g, '').replace(/\/$/, ''));
      if (isNaN(date)) return dateStr;
      const dayName = date.toLocaleDateString('ko-KR', { weekday: 'short' });
      return `${dateStr} (${dayName})`;
    }

    function filterByTeam(team) {
      selectedTeam = team;
      updateTeamTabStyles();
      renderRecords(records);
    }

    function updateTeamTabStyles() {
      document.querySelectorAll('.team-tab').forEach(tab => {
        const v = tab.getAttribute('data-team');
        if (v === selectedTeam) {
          tab.classList.add('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
          tab.classList.remove('bg-white/5', 'border-white/10', 'text-gray-400', 'hover:bg-white/10');
        } else {
          tab.classList.remove('bg-cyan-500/20', 'border-cyan-500/50', 'text-cyan-400');
          tab.classList.add('bg-white/5', 'border-white/10', 'text-gray-400', 'hover:bg-white/10');
        }
      });
    }

    function openMonthlySummary() {
      const modal = document.getElementById('summary-modal');
      const content = document.getElementById('summary-content');

      const monthsData = {};
      records.forEach(record => {
        if (!monthsData[record.month]) monthsData[record.month] = [];
        monthsData[record.month].push(record);
      });

      const sortedMonths = Object.keys(monthsData).sort().reverse();
      let html = sortedMonths.length === 0
        ? '<div class="text-center text-gray-400">아직 기록이 없습니다</div>'
        : sortedMonths.map(m => renderMonthlySummaryCard(m, monthsData[m])).join('');

      content.innerHTML = html;
      modal.classList.remove('hidden');
    }

    function renderMonthlySummaryCard(monthKey, monthRecords) {
      const monthDisplay = formatMonthDisplay(monthKey);
      const byTeam = {}, byPerson = {};

      monthRecords.forEach(record => {
        if (!byTeam[record.team]) byTeam[record.team] = { checkIn: 0, checkOut: 0, days: new Set() };
        if (record.type === 'check-in') byTeam[record.team].checkIn++;
        else byTeam[record.team].checkOut++;
        byTeam[record.team].days.add(record.date);

        const pk = `${record.name}|${record.team}`;
        if (!byPerson[pk]) byPerson[pk] = { name: record.name, team: record.team, checkIn: 0, checkOut: 0, days: new Set() };
        if (record.type === 'check-in') byPerson[pk].checkIn++;
        else byPerson[pk].checkOut++;
        byPerson[pk].days.add(record.date);
      });

      let card = `<div class="bg-white/5 rounded-lg border border-white/10 p-6">
        <h3 class="text-xl font-bold text-cyan-400 mb-4">${monthDisplay}</h3>
        <div class="mb-6">
          <h4 class="text-lg font-semibold text-white mb-3">반별 현황</h4>
          <div class="grid grid-cols-2 gap-3">`;

      Object.entries(byTeam).sort().forEach(([team, stats]) => {
        card += `<div class="bg-white/10 rounded-lg p-4 border border-white/10">
          <div class="text-sm font-medium text-gray-400 mb-2">${team}</div>
          <div class="space-y-1">
            <div class="text-sm text-gray-300">출근: <span class="text-emerald-400 font-semibold">${stats.checkIn}</span></div>
            <div class="text-sm text-gray-300">퇴근: <span class="text-rose-400 font-semibold">${stats.checkOut}</span></div>
            <div class="text-sm text-gray-300">근무일: <span class="text-cyan-400 font-semibold">${stats.days.size}</span></div>
          </div></div>`;
      });

      card += `</div></div><div>
        <h4 class="text-lg font-semibold text-white mb-3">학생별 현황</h4>
        <div class="space-y-2">`;

      Object.values(byPerson).sort((a, b) => a.name.localeCompare(b.name)).forEach(person => {
        card += `<div class="flex justify-between items-center bg-white/10 rounded p-3 border border-white/10 text-sm">
          <div>
            <span class="text-gray-300">${person.name}</span>
            <span class="text-xs text-gray-500 ml-2">(${person.team})</span>
          </div>
          <div class="flex gap-4">
            <span class="text-gray-300">출근: <span class="text-emerald-400 font-semibold">${person.checkIn}</span></span>
            <span class="text-gray-300">퇴근: <span class="text-rose-400 font-semibold">${person.checkOut}</span></span>
            <span class="text-gray-300">근무일: <span class="text-cyan-400 font-semibold">${person.days.size}</span></span>
          </div></div>`;
      });

      card += `</div></div></div>`;
      return card;
    }

    function closeMonthlySummary() {
      document.getElementById('summary-modal').classList.add('hidden');
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('current-time').textContent =
        now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('current-date').textContent =
        now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg transition-opacity duration-300 text-sm ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} text-white opacity-100`;
      setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
    }

    function getTodayString() {
      return new Date().toLocaleDateString('ko-KR');
    }

    function getMonthString(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    async function handleCheckIn() {
      if (isLoading) return;
      const team = document.getElementById('team-input').value.trim();
      const name = document.getElementById('name-input').value.trim();

      if (!team) { showToast('반을 선택해주세요.', 'error'); document.getElementById('team-input').focus(); return; }
      if (!name) { showToast('이름을 입력해주세요.', 'error'); document.getElementById('name-input').focus(); return; }

      isLoading = true;
      document.getElementById('check-in-btn').disabled = true;

      const now = new Date();
      const record = {
        name, team,
        type: 'check-in',
        date: getTodayString(),
        time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }),
        month: getMonthString(now),
        timestamp: now.getTime()
      };

      createRecord(record);
      records = loadRecords();
      renderRecords(records);
      updateTodayStats(records);
      showToast('출근이 기록되었습니다!', 'success');
      document.getElementById('team-input').value = '';
      document.getElementById('name-input').value = '';

      isLoading = false;
      document.getElementById('check-in-btn').disabled = false;
    }

    async function handleCheckOut() {
      if (isLoading) return;
      const team = document.getElementById('team-input').value.trim();
      const name = document.getElementById('name-input').value.trim();

      if (!team) { showToast('반을 선택해주세요.', 'error'); document.getElementById('team-input').focus(); return; }
      if (!name) { showToast('이름을 입력해주세요.', 'error'); document.getElementById('name-input').focus(); return; }

      isLoading = true;
      document.getElementById('check-out-btn').disabled = true;

      const now = new Date();
      const record = {
        name, team,
        type: 'check-out',
        date: getTodayString(),
        time: now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false }),
        month: getMonthString(now),
        timestamp: now.getTime()
      };

      createRecord(record);
      records = loadRecords();
      renderRecords(records);
      updateTodayStats(records);
      showToast('퇴근이 기록되었습니다!', 'success');
      document.getElementById('team-input').value = '';
      document.getElementById('name-input').value = '';

      isLoading = false;
      document.getElementById('check-out-btn').disabled = false;
    }

    let deleteConfirmData = null;

    function showDeleteConfirm(checkInId, checkOutId) {
      deleteConfirmData = { checkInId, checkOutId };
      document.getElementById('delete-confirm-modal').classList.remove('hidden');
    }

    function cancelDelete() {
      deleteConfirmData = null;
      document.getElementById('delete-confirm-modal').classList.add('hidden');
    }

    function confirmDelete() {
      if (!deleteConfirmData) return;
      if (deleteConfirmData.checkInId) deleteRecordById(deleteConfirmData.checkInId);
      if (deleteConfirmData.checkOutId) deleteRecordById(deleteConfirmData.checkOutId);

      records = loadRecords();
      renderRecords(records);
      updateTodayStats(records);
      showToast('기록이 삭제되었습니다.', 'success');

      deleteConfirmData = null;
      document.getElementById('delete-confirm-modal').classList.add('hidden');
    }

    function updateTodayStats(data) {
      const today = getTodayString();
      const todayRecords = data.filter(r => r.date === today);
      const checkIns = todayRecords.filter(r => r.type === 'check-in').sort((a, b) => a.timestamp - b.timestamp);
      const checkOuts = todayRecords.filter(r => r.type === 'check-out').sort((a, b) => b.timestamp - a.timestamp);
      document.getElementById('first-check-in').textContent = checkIns.length > 0 ? checkIns[0].time : '--:--';
      document.getElementById('last-check-out').textContent = checkOuts.length > 0 ? checkOuts[0].time : '--:--';
    }

    function renderRecords(data) {
      const container = document.getElementById('records-list');
      const countEl = document.getElementById('record-count');

      let monthRecords = data.filter(r => r.month === currentMonth);
      if (selectedTeam !== 'all') monthRecords = monthRecords.filter(r => r.team === selectedTeam);
      countEl.textContent = `${monthRecords.length}건`;

      if (monthRecords.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 text-sm">아직 기록이 없습니다</div>';
        return;
      }

      const sortedRecords = [...monthRecords].sort((a, b) => b.timestamp - a.timestamp);
      const byDate = {};
      sortedRecords.forEach(record => {
        if (!byDate[record.date]) byDate[record.date] = [];
        byDate[record.date].push(record);
      });

      let html = '<div class="space-y-3">';
      Object.entries(byDate).forEach(([date, dateRecords]) => {
        const byPerson = {};
        dateRecords.forEach(record => {
          const key = `${record.name}|${record.team}`;
          if (!byPerson[key]) byPerson[key] = { name: record.name, team: record.team, records: [] };
          byPerson[key].records.push(record);
        });

        html += `<div class="bg-white/5 rounded-lg border border-white/10 overflow-hidden">
          <div class="px-4 py-2 bg-white/10 border-b border-white/10">
            <div class="text-sm font-semibold text-gray-300 text-center">${formatDateWithDay(date)}</div>
          </div>
          <div class="p-3 space-y-2">`;

        Object.values(byPerson).forEach(person => {
          const checkIn = person.records.find(r => r.type === 'check-in');
          const checkOut = person.records.find(r => r.type === 'check-out');
          html += `
            <div class="record-enter flex items-center justify-between bg-white/5 rounded p-3 border border-white/10 hover:bg-white/10 transition-colors">
              <div class="flex-1 min-w-0 text-center">
                <div class="text-sm font-semibold text-cyan-400">${person.name}</div>
                <div class="text-xs text-gray-500">${person.team}</div>
              </div>
              <div class="flex gap-3 ml-2">
                <div class="text-center">
                  <div class="text-xs text-gray-500 mb-0.5">출근</div>
                  <div class="text-sm font-semibold ${checkIn ? 'text-emerald-400' : 'text-gray-600'}">${checkIn ? checkIn.time : '-'}</div>
                </div>
                <div class="text-center">
                  <div class="text-xs text-gray-500 mb-0.5">퇴근</div>
                  <div class="text-sm font-semibold ${checkOut ? 'text-rose-400' : 'text-gray-600'}">${checkOut ? checkOut.time : '-'}</div>
                </div>
              </div>
              <button onclick="showDeleteConfirm('${checkIn?.__id || ''}', '${checkOut?.__id || ''}')" class="ml-3 p-1.5 hover:bg-rose-500/20 rounded transition-colors text-gray-400 hover:text-rose-400 flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              </button>
            </div>`;
        });

        html += `</div></div>`;
      });

      html += '</div>';
      container.innerHTML = html;
    }

    function init() {
      records = loadRecords();
      document.getElementById('current-month').textContent = formatMonthDisplay(currentMonth);
      updateTeamTabStyles();
      updateClock();
      setInterval(updateClock, 1000);
      renderRecords(records);
      updateTodayStats(records);
    }

    init();
  </script>
 </body>
</html>
